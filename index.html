<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GPS 거리 기록</title><style>body{font-family:system-ui,-apple-system,sans-serif;background:#111;color:#fff;margin:0;padding:18px}button{font-size:18px;padding:16px;border:0;border-radius:14px;margin:6px;background:#fff;color:#111;font-weight:800}.box{background:#222;border-radius:18px;padding:18px;margin:12px 0}.big{font-size:44px;font-weight:900}.muted{color:#aaa;line-height:1.5;white-space:pre-wrap}</style></head><body><h1>GPS 거리 기록</h1><div class="box"><div>누적 거리</div><div class="big" id="d">0 m</div></div><div class="box"><div>시간</div><div class="big" id="t">00:00:00</div></div><button id="s">시작</button><button id="p" disabled>정지</button><button id="r">초기화</button><div class="box muted" id="log">대기 중</div><script>let w=null,last=null,m=0,start=0,timer=null;const $=x=>document.getElementById(x);const rad=x=>x*Math.PI/180;function dis(a,b){let R=6371000,d1=rad(b.lat-a.lat),d2=rad(b.lon-a.lon),p1=rad(a.lat),p2=rad(b.lat),h=Math.sin(d1/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(d2/2)**2;return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}function fd(x){return x<1000?Math.round(x)+' m':(x/1000).toFixed(2)+' km'}function ft(s){return [Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(v=>String(v).padStart(2,'0')).join(':')}function render(){$('d').textContent=fd(m);$('t').textContent=start?ft(Math.floor((Date.now()-start)/1000)):'00:00:00'}function pos(o){let p={lat:o.coords.latitude,lon:o.coords.longitude,acc:o.coords.accuracy,time:o.timestamp};$('log').textContent='lat '+p.lat.toFixed(7)+'\nlon '+p.lon.toFixed(7)+'\naccuracy ±'+Math.round(p.acc)+'m';if(p.acc>60)return;if(last){let x=dis(last,p);if(x>=5&&x<300)m+=x}last=p;render()}function err(e){$('log').textContent='위치 오류: '+e.message}function startRun(){if(!navigator.geolocation){$('log').textContent='GPS 미지원';return}start=Date.now();w=navigator.geolocation.watchPosition(pos,err,{enableHighAccuracy:true,maximumAge:1000,timeout:15000});timer=setInterval(render,1000);$('s').disabled=true;$('p').disabled=false}function stopRun(){if(w!==null)navigator.geolocation.clearWatch(w);w=null;if(timer)clearInterval(timer);timer=null;$('s').disabled=false;$('p').disabled=true}function reset(){stopRun();last=null;m=0;start=0;$('log').textContent='초기화됨';render()}$('s').onclick=startRun;$('p').onclick=stopRun;$('r').onclick=reset;render();</script></body></html>
