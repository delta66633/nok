<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>GPS 미터기</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#2a2a32,#070708 55%);color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;padding:14px}.w{max-width:520px;margin:auto}h1{font-size:28px;margin:10px 4px 14px;letter-spacing:-.05em}.meter{background:linear-gradient(#22232a,#09090b);border:1px solid #45454f;border-radius:20px;box-shadow:0 22px 50px #000a;overflow:hidden}.top{display:flex;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #ffffff14;font-weight:900}.top small{color:#aaa}.body{display:grid;grid-template-columns:70px 1fr;gap:10px;padding:12px}.side{background:#08080a;border:1px solid #2b2b31;border-radius:13px;padding:10px 8px}.i{display:flex;gap:7px;align-items:center;font-size:12px;font-weight:900;margin-bottom:13px}.i:last-child{margin-bottom:0}.dot{width:10px;height:10px;border-radius:50%;background:#3d3d43}.r{background:#ff2a2a;box-shadow:0 0 13px #ff2a2a}.g{background:#5cff82;box-shadow:0 0 13px #5cff82}.y{background:#ffd447;box-shadow:0 0 13px #ffd447}.screen{background:#050506;border:1px solid #292932;border-radius:15px;padding:12px}.row{display:grid;grid-template-columns:62px 1fr 24px;gap:8px;align-items:center}.lb{font-size:18px;font-weight:900}.unit{font-weight:900;text-align:right}.led{height:66px;border-radius:10px;border:1px solid #ff000026;background:linear-gradient(#29000055,#000b);font:900 48px 'Courier New',monospace;color:#ff2929;text-shadow:0 0 8px #ff2929,0 0 24px #ff292980;display:flex;align-items:center;justify-content:flex-end;padding:6px 10px;overflow:hidden}.sub{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid #ffffff16}.mini{display:grid;grid-template-columns:44px 1fr 24px;gap:6px;align-items:end}.ml{font-size:14px;font-weight:900}.mled{height:46px;border-radius:9px;border:1px solid #ff000022;background:linear-gradient(#29000044,#000a);font:900 28px 'Courier New',monospace;color:#ff2929;text-shadow:0 0 7px #ff2929;display:flex;align-items:center;justify-content:flex-end;padding:5px 8px}.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 12px 12px}button,.fake{border:1px solid #555561;border-radius:13px;min-height:54px;background:linear-gradient(#2d2d35,#15151a);color:#fff;font-weight:900;font-size:13px}.start{background:linear-gradient(#2f8134,#174819)}.pause{background:linear-gradient(#806520,#4d3a0e)}.stop{background:linear-gradient(#8d2525,#5a1111)}.fake{display:flex;align-items:center;justify-content:center}.fake.red{background:linear-gradient(#922929,#5b1111)}.panel{margin-top:14px;background:#ffffff08;border:1px solid #ffffff15;border-radius:16px;overflow:hidden}.pt{padding:12px 14px;font-weight:900;border-bottom:1px solid #ffffff12}.status,.meta{padding:12px 14px;color:#aaa;font-size:13px;line-height:1.45;white-space:pre-wrap}.ok{color:#9effb6}.warn{color:#ffdc7d}.err{color:#ff9b9b}.set{padding:10px 14px}.f{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #ffffff12}.f:last-child{border-bottom:0}.f input{width:115px;background:#101014;color:#fff;border:1px solid #3a3a44;border-radius:10px;padding:10px;text-align:right;font-size:16px}@media(max-width:430px){.body{grid-template-columns:62px 1fr;padding:10px;gap:8px}.led{font-size:39px;height:58px}.sub{grid-template-columns:1fr}.buttons{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class="w"><h1>GPS 미터기</h1><div class="meter"><div class="top"><div>MICOM <small>미터기</small></div><small>GPS UI</small></div><div class="body"><div class="side"><div class="i"><span id="dr" class="dot"></span>주행</div><div class="i"><span id="em" class="dot g"></span>빈차</div><div class="i"><span id="pa" class="dot"></span>대기</div><div class="i"><span id="py" class="dot"></span>지불</div></div><div class="screen"><div class="row"><div class="lb">요금</div><div id="fare" class="led">4,800</div><div class="unit">원</div></div><div class="sub"><div class="mini"><div class="ml">거리</div><div id="km" class="mled">0.0</div><div class="unit">Km</div></div><div class="mini"><div class="ml">시간</div><div id="tm" class="mled">00:00</div><div class="unit">분</div></div></div></div></div><div class="buttons"><button id="start" class="start">주행 시작</button><button id="pause" class="pause" disabled>일시정지</button><button id="stop" class="stop" disabled>종료</button><button id="reset">초기화</button><div class="fake">지불</div><div class="fake">복합</div><div class="fake">빈차</div><div class="fake red">메뉴</div></div></div><div class="panel"><div class="pt">상태</div><div id="st" class="status">대기 중입니다.</div></div><details class="panel" open><summary class="pt">요금 설정</summary><div class="set"><label class="f">기본요금<input id="base" type="number" value="4800"></label><label class="f">추가 거리 단위 m<input id="unitm" type="number" value="100"></label><label class="f">단위당 추가요금 원<input id="unitw" type="number" value="100"></label><label class="f">최소 이동 인식 m<input id="minm" type="number" value="6"></label><label class="f">최대 GPS 오차 m<input id="maxa" type="number" value="50"></label></div></details><div class="panel"><div class="pt">현재 좌표</div><div id="gps" class="meta">아직 위치 정보가 없습니다.</div></div></div><script>const $=id=>document.getElementById(id);let w=null,timer=null,startAt=0,pauseMs=0,pauseAt=0,paused=false,meters=0,last=null,pts=0;const n=id=>Number($(id).value)||0,rad=x=>x*Math.PI/180;function dist(a,b){let R=6371000,d1=rad(b.lat-a.lat),d2=rad(b.lng-a.lng),p1=rad(a.lat),p2=rad(b.lat),h=Math.sin(d1/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(d2/2)**2;return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}function sec(){return startAt?Math.max(0,Math.floor((Date.now()-startAt-pauseMs)/1000)):0}function price(){return n('base')+Math.floor(meters/Math.max(1,n('unitm')))*n('unitw')}function mm(s){let m=Math.floor(s/60),x=s%60;return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0')}function st(t,c=''){$('st').textContent=t;$('st').className='status '+c}function render(){$('fare').textContent=price().toLocaleString('ko-KR');$('km').textContent=(meters/1000).toFixed(1);$('tm').textContent=mm(sec());$('dr').className='dot'+(w&&!paused?' r':'');$('em').className='dot'+(!w?' g':'');$('pa').className='dot'+(paused?' y':'');$('py').className='dot'}function pos(o){let p={lat:o.coords.latitude,lng:o.coords.longitude,acc:o.coords.accuracy,time:o.timestamp};$('gps').textContent='lat: '+p.lat.toFixed(7)+'\nlng: '+p.lng.toFixed(7)+'\naccuracy: ±'+Math.round(p.acc)+'m\npoints: '+pts;if(paused){st('일시정지 상태입니다.','warn');return}if(p.acc>n('maxa')){st('GPS 오차가 커서 좌표를 무시했습니다. ±'+Math.round(p.acc)+'m','warn');return}if(!last){last=p;pts=1;st('GPS 수신 시작. 이동하면 요금과 거리가 누적됩니다.','ok');render();return}let mv=dist(last,p),gap=Math.max(1,(p.time-last.time)/1000),kmh=(mv/1000)/(gap/3600);if(mv<n('minm')){st('미세 이동 '+mv.toFixed(1)+'m 무시','warn');return}if(kmh>180){st('비정상 GPS 튐 '+kmh.toFixed(0)+'km/h 무시','warn');return}meters+=mv;last=p;pts++;st('주행 중입니다.','ok');render()}function err(e){let m='위치 정보를 가져오지 못했습니다.';if(e.code===1)m='위치 권한이 거부되었습니다.';if(e.code===2)m='현재 위치를 사용할 수 없습니다.';if(e.code===3)m='GPS 응답 시간이 초과되었습니다.';st(m,'err')}function start(){if(!navigator.geolocation){st('위치 기능을 지원하지 않습니다.','err');return}if(w)return;startAt=Date.now();pauseMs=0;pauseAt=0;paused=false;w=navigator.geolocation.watchPosition(pos,err,{enableHighAccuracy:true,maximumAge:1000,timeout:15000});timer=setInterval(render,1000);$('start').disabled=true;$('pause').disabled=false;$('stop').disabled=false;st('GPS 연결 중입니다. 위치 권한을 허용하십시오.','warn');render()}function pause(){if(!w)return;if(!paused){paused=true;pauseAt=Date.now();$('pause').textContent='재개';st('일시정지되었습니다.','warn')}else{paused=false;if(pauseAt)pauseMs+=Date.now()-pauseAt;$('pause').textContent='일시정지';st('주행을 재개했습니다.','ok')}render()}function stop(){if(w)navigator.geolocation.clearWatch(w);w=null;if(timer)clearInterval(timer);timer=null;paused=false;$('start').disabled=false;$('pause').disabled=true;$('stop').disabled=true;$('pause').textContent='일시정지';st('측정을 종료했습니다.','ok');render()}function reset(){stop();startAt=0;pauseMs=0;meters=0;last=null;pts=0;$('gps').textContent='아직 위치 정보가 없습니다.';st('초기화되었습니다.');render()}$('start').onclick=start;$('pause').onclick=pause;$('stop').onclick=stop;$('reset').onclick=reset;['base','unitm','unitw'].forEach(id=>$(id).addEventListener('input',render));render();</script></body></html>
